name: Release from staging

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag to create, for example v0.1.0"
        required: true
        type: string
      release_name:
        description: "Optional release title. Defaults to the release tag."
        required: false
        type: string

permissions:
  contents: write

concurrency:
  group: release-from-staging
  cancel-in-progress: false

jobs:
  release:
    name: Promote staging and create release
    runs-on: ubuntu-latest

    steps:
      - name: Validate source branch
        run: |
          if [ "${GITHUB_REF_NAME}" != "staging" ]; then
            echo "Run this workflow from the staging branch."
            exit 1
          fi

      - name: Check out staging
        uses: actions/checkout@v4
        with:
          ref: staging
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Validate release tag
        env:
          RELEASE_TAG: ${{ inputs.release_tag }}
        run: |
          if ! printf '%s' "${RELEASE_TAG}" | grep -Eq '^v[0-9]+[.][0-9]+[.][0-9]+([-+][0-9A-Za-z.-]+)?$'; then
            echo "release_tag must look like v1.2.3, with optional semver suffix."
            exit 1
          fi

          if git ls-remote --exit-code --tags origin "refs/tags/${RELEASE_TAG}" >/dev/null 2>&1; then
            echo "Tag ${RELEASE_TAG} already exists."
            exit 1
          fi

      - name: Promote staging to main
        run: git push origin HEAD:main

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ inputs.release_tag }}
          RELEASE_NAME: ${{ inputs.release_name }}
        run: |
          release_target_sha="$(git rev-parse HEAD)"

          if [ -z "${RELEASE_NAME}" ]; then
            RELEASE_NAME="${RELEASE_TAG}"
          fi

          gh release create "${RELEASE_TAG}" \
            --title "${RELEASE_NAME}" \
            --target "${release_target_sha}" \
            --generate-notes
